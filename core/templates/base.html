<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}League{% endblock %}</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    >
    <script src="/static/core/js/player_scores_modal.js"></script>
    <script src="/static/core/js/team_schedule_modal.js"></script>
    <script src="/static/core/js/team_full_schedule_modal.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            {% if active_league.results_type != 'one_pocket' %}
            <a class="navbar-brand" href="/">{{ league_name }}</a>
            {% else %}
            <a class="navbar-brand" href="/"><img src="/static/core/images/bogies.png" alt="One Pocket Logo"></a>
            {% endif %}
            <button
                class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#mainNavbar"
                aria-controls="mainNavbar"
                aria-expanded="false"
                aria-label="Toggle navigation"
            >
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="mainNavbar">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    {% if active_league.results_type != 'one_pocket' %}
                    <li class="nav-item">
                        <a class="nav-link" href="/schedule/">Schedule</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/standings/">Standings</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/player-stats/">Player Stats</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/contact-info/">Contact Info</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/rules/">Rules</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/archived-seasons/">Archived</a>
                    </li>
                    {% endif %}
                </ul>

                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/">Admin</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-4">
        {% block content %}{% endblock %}
    </main>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"
    ></script>
<br><br>
</body>
</html>
