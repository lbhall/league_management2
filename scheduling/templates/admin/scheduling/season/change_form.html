{% extends "admin/change_form.html" %}

{% block extrastyle %}
    {{ block.super }}
    <style>
        .schedule-week-card {
            border: 1px solid #ddd;
            border-radius: 6px;
            margin-bottom: 20px;
            background: #fff;
        }

        .schedule-week-card.schedule-week-holiday {
            border: 1px solid #d6b656;
            background: #fff8db;
        }

        .schedule-week-header {
            padding: 12px 16px;
            border-bottom: 1px solid #eee;
            background: #f8f8f8;
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: flex-start;
        }

        .schedule-week-card.schedule-week-holiday .schedule-week-header {
            background: #f7e7a8;
            border-bottom: 1px solid #d6b656;
        }

        .schedule-week-header-main {
            flex: 1;
            min-width: 0;
        }

        .schedule-week-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .schedule-week-title {
            color: #1f1f1f;
            font-size: 16px;
            font-weight: 700;
        }

        .schedule-week-card.schedule-week-holiday .schedule-week-title {
            color: #6b5200;
        }

        .schedule-week-body {
            padding: 16px;
        }

        .schedule-match-table {
            width: 100%;
            border-collapse: collapse;
        }

        .schedule-match-table th,
        .schedule-match-table td {
            padding: 10px 12px;
            border-bottom: 1px solid #eee;
            vertical-align: top;
        }

        .schedule-match-table th {
            text-align: left;
            background: #fafafa;
            color: #1f1f1f;
        }

        .schedule-inline-form {
            display: inline-flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .schedule-location-input {
            min-width: 220px;
        }

        .schedule-empty {
            color: #777;
            margin: 0;
        }

        .schedule-meta {
            color: #333;
            font-size: 12px;
            margin-top: 4px;
        }

        .schedule-meta.schedule-home-venue {
            color: #8a8a8a;
            font-weight: 400;
        }

        .schedule-bye-list {
            margin: 12px 0 0;
            padding-left: 18px;
            color: #666;
        }

        .schedule-bye-list li {
            margin-bottom: 4px;
        }

        .schedule-disabled-note {
            color: #666;
            font-size: 12px;
            font-style: italic;
        }

        .schedule-score-status {
            display: block;
            margin-bottom: 6px;
            font-size: 12px;
            font-weight: 600;
        }

        .schedule-score-status.scored {
            color: #2e7d32;
        }

        .schedule-score-status.not-scored {
            color: #8a6d3b;
        }

        .schedule-holiday-label {
            display: inline-block;
            margin-top: 6px;
            padding: 3px 8px;
            border-radius: 999px;
            background: #c58b00;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
        }

        .schedule-holiday-note {
            color: #5a4600;
            font-weight: 600;
            margin: 0;
        }
    </style>
{% endblock %}

{% block object-tools-items %}
    {{ block.super }}
    {% if change %}
        <li>
            <a href="{% url 'admin:scheduling_season_manage_schedule' original.pk %}" class="historylink">Manage Schedule</a>
        </li>
    {% endif %}
{% endblock %}

{% block after_related_objects %}
    {{ block.super }}
{% endblock %}
