# Single Django/gunicorn instance serves all three leagues.
# League selection is done per-request inside Django based on the Host header.

upstream django {
    server web:8000;
}

# ── emcfunleague.com ────────────────────────────────────────────────────────
server {
    listen 80;
    server_name emcfunleague.com www.emcfunleague.com;

    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://django;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

