services:

  web:
    build: .
    expose: ["8000"]
    volumes:
      - ./db.sqlite3:/app/db.sqlite3
      - staticfiles:/app/staticfiles
    environment:
      # Fallback league for requests that don't match any LEAGUE_HOSTS entry
      FRONTEND_LEAGUE_ID: ${FRONTEND_LEAGUE_ID:-1}
      ALLOWED_HOSTS: "emcfunleague.com,www.emcfunleague.com,coed.emcfunleague.com,bogies.emcfunleague.com,localhost,127.0.0.1"
      # Override domain→league mappings if your hostnames differ:
      # EMC_HOST: "emcfunleague.com"
      # COED_HOST: "coed.emcfunleague.com"
      # BOGIES_HOST: "bogies.emcfunleague.com"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - staticfiles:/app/staticfiles:ro
    depends_on:
      - web

volumes:
  staticfiles:
